<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mellow Oven Manager</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mellow Oven">
  <meta name="theme-color" content="#b08968">

  <!-- Performance Optimizations: Preconnect to Supabase and Fonts -->
  <link rel="preconnect" href="https://rzjdxvjytpzhigxoxryb.supabase.co" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="/index.css" as="style" />

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #fbf7f4;
      color: #4a4a4a;
    }

    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #fbf7f4;
    }

    ::-webkit-scrollbar-thumb {
      background: #d6ccc2;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #b08968;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <!-- 🎬 Premium Splash Screen -->
    <div id="splash-screen" style="
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fbf7f4;
      transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
    ">
      <!-- Premium Animated Rings -->
      <div style="position: relative; width: 160px; height: 160px; margin-bottom: 40px;">
        <div style="
          position: absolute;
          inset: 0;
          border: 4px solid #b08968;
          border-radius: 50%;
          border-top-color: transparent;
          animation: spinFast 1s linear infinite;
        "></div>
        <div style="
          position: absolute;
          inset: 15px;
          border: 4px solid #d4a574;
          border-radius: 50%;
          border-bottom-color: transparent;
          animation: spinSlow 2s linear infinite reverse;
        "></div>
        <div style="
          position: absolute;
          inset: 30px;
          border: 4px solid rgba(176,137,104,0.3);
          border-radius: 50%;
          border-left-color: transparent;
          animation: spinMedium 1.5s linear infinite;
        "></div>
        <div style="
          position: absolute;
          inset: 45px;
          background: #b08968;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 0 30px rgba(176,137,104,0.6);
          animation: pulseGlow 2s ease-in-out infinite;
        ">
          <span style="
            color: white;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: 'Prompt', system-ui, sans-serif;
          ">MO</span>
        </div>
      </div>

      <!-- Inject cached logo from localStorage -->
      <script>
        (function () {
          var url = localStorage.getItem('splash-logo-url');
          if (url) {
            // Replace the 'MO' text with the logo if it exists, inside the innermost circle
            var innermost = document.querySelector('#splash-screen > div > div:nth-child(4)');
            if (innermost) {
              innermost.innerHTML = '';
              var img = document.createElement('img');
              img.src = url;
              img.alt = 'Mellow Oven';
              img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;position:relative;z-index:1;';
              innermost.appendChild(img);
            }
          }
        })();
      </script>

      <!-- Brand Name -->
      <h1 style="
        font-family: 'Prompt', system-ui, sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: #4a4a4a;
        margin: 0 0 8px 0;
        letter-spacing: 3px;
        animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      ">
        Mellow <span style="color: #b08968;">Oven</span>
      </h1>

      <p style="
        font-family: 'Prompt', system-ui, sans-serif;
        font-size: 13px;
        color: #b08968;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin: 0 0 40px 0;
        animation: slideUpFade 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
        font-weight: 500;
      ">Café Management</p>

      <!-- Elegant Wait Indicator -->
      <div
        style="display: flex; gap: 8px; animation: slideUpFade 1s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);">
        <div
          style="width: 8px; height: 8px; border-radius: 50%; background: #b08968; animation: bounceBounce 1.4s ease-in-out infinite both;">
        </div>
        <div
          style="width: 8px; height: 8px; border-radius: 50%; background: #b08968; animation: bounceBounce 1.4s ease-in-out infinite both; animation-delay: 0.2s;">
        </div>
        <div
          style="width: 8px; height: 8px; border-radius: 50%; background: #b08968; animation: bounceBounce 1.4s ease-in-out infinite both; animation-delay: 0.4s;">
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spinFast {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spinMedium {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spinSlow {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulseGlow {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(176, 137, 104, 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(176, 137, 104, 0.8);
      }
    }

    @keyframes slideUpFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounceBounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    #splash-screen.fade-out {
      opacity: 0 !important;
      transform: scale(1.05) !important;
      pointer-events: none !important;
    }
  </style>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
